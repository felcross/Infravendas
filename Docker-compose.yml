services:

  frontend:
    image: felcross/frontend:latest
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - bff
    networks:
      - rede

  # ─── BANCOS DE DADOS ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: dbpostgres-vendas
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: db_clientes
    ports:
      - "5432:5432"
    networks:
      - rede
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d db_clientes"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: mongodb-vendas
    ports:
      - "27017:27017"
    networks:
      - rede
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-vendas
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"   # painel de administração web
    networks:
      - rede
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ─── MICROSERVIÇOS ────────────────────────────────────────────────────────────

  clientes:
    image: felcross/clientes:latest
    container_name: clientes
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_clientes
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rede

  produtos:
    image: felcross/produtos:latest
    container_name: produtos
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/db_produtos
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - rede

  vendas:
    image: felcross/vendas:latest
    container_name: vendas
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/db_vendas
      CLIENTES_URL: http://clientes:8080
      PRODUTOS_URL: http://produtos:8081
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8082:8082"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      clientes:
        condition: service_started
      produtos:
        condition: service_started
    networks:
      - rede

  notificacao:
    image: felcross/notificacao:latest
    container_name: notificacao
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "8083:8083"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - rede

  bff:
    image: felcross/bff:latest
    container_name: bff-vendas
    environment:
      CLIENTES_URL: http://clientes:8080
      PRODUTOS_URL: http://produtos:8081
      VENDAS_URL: http://vendas:8082
      NOTIFICACAO_URL: http://notificacao:8083
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8084:8084"
    depends_on:
      - clientes
      - produtos
      - vendas
      - notificacao
    networks:
      - rede

# ─── REDE E VOLUMES ─────────────────────────────────────────────────────────────

networks:
  rede:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  rabbitmq_data: